<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <span class="logo" onclick="openVideo()">GPG</span>

  <a href="https://soundcloud.com/cur16-217319836" target="_blank" class="float-btn left">1</a>
  <a href="https://soundcloud.com/ilovehousemusick" target="_blank" class="float-btn right">2</a>

  <audio id="bgAudio" src="audio/gpg%20tag.flac"></audio>

  <div id="videoOverlay" class="overlay hidden">
    <div class="video-container">
      <button class="close-btn" onclick="closeVideo()">✕</button>
      <video id="player" controls>
        <source src="https://pub-ec161821185d4b0c876e22a4dc1b4c67.r2.dev/videos/output.webm" type="video/webm">
      </video>
    </div>
  </div>

  <script>
    document.addEventListener('click', function startAudio() {
      const audio = document.getElementById('bgAudio');
      audio.play().catch(err => console.log(err));
      document.removeEventListener('click', startAudio);
    });

    function openVideo() {
      document.getElementById('videoOverlay').classList.remove('hidden');
    }

    function closeVideo() {
      const overlay = document.getElementById('videoOverlay');
      overlay.classList.add('hidden');
      document.getElementById('player').pause();
    }
  </script>
</body>
</html>
