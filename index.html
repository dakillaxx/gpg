<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#" class="logo" onclick="openLinks(event)">GPG</a>
  <a href="https://soundcloud.com/cur16-217319836" target="_blank" class="float-btn">1</a>

  <audio id="bgAudio" src="audio/gpg%20tag.flac"></audio>

  <div class="void"></div>

  <script>
    function openLinks(e) {
      e.preventDefault();
      window.open("https://soundcloud.com/ilovehousemusick", "_blank");
      window.open("https://soundcloud.com/cur16-217319836", "_blank");
    }

    document.addEventListener('click', function startAudio() {
      const audio = document.getElementById('bgAudio');
      audio.play().catch(err => console.log("Autoplay bloccato:", err));
      document.removeEventListener('click', startAudio);
    });

    const voidEl = document.querySelector('.void');
    const numStars = 400;
    for (let i = 0; i < numStars; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.opacity = Math.random() * 0.8 + 0.1;
      voidEl.appendChild(star);
    }
  </script>
</body>
</html>
